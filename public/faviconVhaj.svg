<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

<defs>
  <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#38bdf8"/>
    <stop offset="100%" stop-color="#a78bfa"/>
  </linearGradient>
</defs>

<!-- barras -->
<g fill="url(#grad)">
  <rect x="92" y="20" width="16" height="160"/>
  <rect x="92" y="20" width="16" height="160" transform="rotate(45 100 100)"/>
  <rect x="92" y="20" width="16" height="160" transform="rotate(90 100 100)"/>
  <rect x="92" y="20" width="16" height="160" transform="rotate(135 100 100)"/>
</g>

<!-- linea corta dentro de la barra diagonal -->
<line 
x1="100" 
y1="70" 
x2="100" 
y2="90"
stroke="#f1f5f9"
stroke-width="4"
stroke-linecap="round"
transform="rotate(45 100 100)"/>

</svg>
